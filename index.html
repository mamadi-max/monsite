<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ID-Intello Digit | L'expertise au bout des doigts</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --blue: #1a3fa5;
      --blue-dark: #0e2570;
      --blue-light: #2d5be3;
      --green: #3aad3a;
      --green-light: #5ecf5e;
      --green-dark: #228b22;
      --white: #ffffff;
      --gray-light: #f4f6fb;
      --gray: #e0e4ef;
      --text: #1a2340;
      --text-muted: #5a6480;
      --accent: #ffd700;
      --shadow: 0 8px 40px rgba(26,63,165,0.13);
      --radius: 18px;
    }
    html[data-theme="dark"] {
      --white: #131a2e;
      --gray-light: #0c1120;
      --gray: #232c47;
      --text: #eef1fb;
      --text-muted: #9aa6c8;
      --shadow: 0 8px 40px rgba(0,0,0,0.4);
    }
    html[data-theme="dark"] body { background: var(--gray-light); }
    html[data-theme="dark"] .service-card-body,
    html[data-theme="dark"] .tarif-card,
    html[data-theme="dark"] .contact-form,
    html[data-theme="dark"] .modal,
    html[data-theme="dark"] .quote-box,
    html[data-theme="dark"] .testimonial-card { background: var(--white); }
    html[data-theme="dark"] .form-group input,
    html[data-theme="dark"] .form-group textarea,
    html[data-theme="dark"] .form-group select { background: var(--gray-light); color: var(--text); }
    .theme-toggle {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem; transition: transform 0.2s, background 0.2s;
      flex-shrink: 0;
    }
    .theme-toggle:hover { background: rgba(255,255,255,0.2); transform: rotate(15deg); }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--gray-light);
      color: var(--text);
      overflow-x: hidden;
      width: 100%;
      min-width: 320px;
    }
    img, svg, video { max-width: 100%; height: auto; display: block; }
    button, input, select, textarea { font-family: inherit; max-width: 100%; }
    .wrap {
      max-width: 1360px;
      margin: 0 auto;
    }

    /* ===== FLOATING BUTTONS ===== */
    .float-btns {
      position: fixed;
      bottom: 28px; right: 22px;
      z-index: 9999;
      display: flex; flex-direction: column; gap: 12px;
      align-items: flex-end;
    }
    .float-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 20px;
      border-radius: 50px;
      color: #fff;
      font-weight: 700; font-size: 0.95rem;
      text-decoration: none;
      box-shadow: 0 6px 24px rgba(0,0,0,0.22);
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }
    .float-btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 12px 32px rgba(0,0,0,0.28); }
    .float-btn.wa { background: #25D366; }
    .float-btn.fb { background: #1877F2; }
    .float-btn i { font-size: 1.3rem; }
    .float-btn.chat-toggle-btn, .float-btn.share-btn { background: var(--blue); border: none; font-family: inherit; }
    .float-btn.share-btn { background: var(--blue-dark); }

    /* ===== CHAT FAQ PANEL ===== */
    .chat-panel {
      position: fixed; bottom: 96px; right: 22px; z-index: 9998;
      width: min(320px, 86vw); background: #fff; border-radius: 18px;
      box-shadow: 0 16px 50px rgba(0,0,0,0.28);
      display: none; flex-direction: column; padding: 20px;
      max-height: 70vh; overflow-y: auto;
    }
    .chat-panel.open { display: flex; }
    .chat-panel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .chat-panel-head div { font-family: 'Exo 2', sans-serif; font-weight: 800; color: var(--text); font-size: 1.02rem; }
    .chat-panel-head i { color: var(--blue); margin-right: 8px; }
    .chat-close { background: none; border: none; font-size: 1.1rem; color: var(--text-muted); cursor: pointer; }
    .chat-panel-sub { color: var(--text-muted); font-size: 0.83rem; margin-bottom: 14px; }
    .chat-faq-list { display: flex; flex-direction: column; gap: 8px; }
    .chat-faq-item {
      text-align: left; background: var(--gray-light); border: 1px solid var(--gray);
      border-radius: 10px; padding: 11px 14px; font-size: 0.86rem; font-weight: 600;
      color: var(--text); cursor: pointer; transition: background 0.18s, border-color 0.18s;
    }
    .chat-faq-item:hover { background: rgba(37,211,102,0.1); border-color: #25D366; }

    /* ===== NAV ===== */
    nav {
      position: sticky; top: 0; z-index: 999;
      background: var(--blue-dark);
      box-shadow: 0 2px 24px rgba(14,37,112,0.25);
      padding: 0 5vw;
      display: flex; align-items: center; justify-content: space-between;
      height: 100px;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none;
    }
    .nav-logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--blue-light), var(--green));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Exo 2', sans-serif;
      font-weight: 900; font-size: 1.2rem; color: #fff;
      letter-spacing: -1px;
    }
    .nav-logo-text { font-family: 'Exo 2', sans-serif; font-weight: 700; font-size: 1.15rem; color: #fff; line-height: 1.1; }
    .nav-logo-text span { display: block; font-size: 0.72rem; font-weight: 400; color: var(--green-light); letter-spacing: 0.04em; }
    .nav-links {
      display: flex; gap: 6px; list-style: none;
    }
    .nav-links a {
      color: #c8d4f8; text-decoration: none;
      padding: 8px 14px; border-radius: 8px;
      font-size: 0.93rem; font-weight: 600;
      transition: background 0.18s, color 0.18s;
    }
    .nav-links a:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .nav-cta {
      background: var(--green); color: #fff !important;
      border-radius: 50px !important; padding: 9px 20px !important;
    }
    .nav-cta:hover { background: var(--green-light) !important; }
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 6px; }
    .hamburger span { display: block; width: 26px; height: 3px; background: #fff; border-radius: 3px; margin: 5px 0; transition: 0.3s; }
    @media(max-width:820px){
      nav { height: 88px; }
      .nav-links { display: none; flex-direction: column; position: absolute; top: 88px; left: 0; right: 0; background: var(--blue-dark); padding: 16px 5vw 20px; gap: 4px; }
      .nav-links.open { display: flex; }
      .hamburger { display: block; }
    }

    /* ===== LOGO (image réelle + repli automatique) ===== */
    .nav-logo-img {
      height: 76px; width: auto; max-width: none;
      object-fit: contain;
      background: #ffffff;
      border-radius: 14px;
      padding: 8px 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.2);
    }
    .footer-logo-img {
      height: 60px; width: auto; max-width: none;
      object-fit: contain;
      background: #ffffff;
      border-radius: 12px;
      padding: 6px 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.2);
    }

    /* ===== BADGE OUVERT / FERMÉ EN DIRECT ===== */
    .open-badge {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.16);
      border-radius: 50px; padding: 6px 14px;
      font-size: 0.8rem; font-weight: 700; color: #cfe0ff;
    }
    .open-badge .dot { width: 9px; height: 9px; border-radius: 50%; background: #ff5252; flex-shrink: 0; box-shadow: 0 0 0 0 rgba(255,82,82,0.5); animation: pulse-dot 1.8s infinite; }
    .open-badge.is-open .dot { background: var(--green-light); box-shadow: 0 0 0 0 rgba(94,207,94,0.5); }
    @keyframes pulse-dot { 0%{box-shadow:0 0 0 0 rgba(255,82,82,0.5);} 70%{box-shadow:0 0 0 8px rgba(255,82,82,0);} 100%{box-shadow:0 0 0 0 rgba(255,82,82,0);} }
    .open-badge.is-open .dot { animation: pulse-dot-green 1.8s infinite; }
    @keyframes pulse-dot-green { 0%{box-shadow:0 0 0 0 rgba(94,207,94,0.5);} 70%{box-shadow:0 0 0 8px rgba(94,207,94,0);} 100%{box-shadow:0 0 0 0 rgba(94,207,94,0);} }
    @media(max-width:640px){ .open-badge span:not(.dot) { display: none; } .open-badge { padding: 8px; } }

    /* ===== HERO ===== */
    .hero {
      min-height: 92vh;
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 55%, var(--blue-light) 100%);
      display: flex; align-items: center;
      position: relative; overflow: hidden;
      padding: 60px 5vw;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 80% 60%, rgba(58,173,58,0.18) 0%, transparent 60%),
                  radial-gradient(ellipse at 20% 30%, rgba(255,215,0,0.07) 0%, transparent 50%);
    }
    .hero-grid {
      position: absolute; inset: 0; opacity: 0.05;
      background-image: linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .hero-content {
      position: relative; z-index: 2;
      max-width: 640px;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 50px;
      padding: 7px 18px;
      color: var(--green-light); font-size: 0.88rem; font-weight: 700;
      margin-bottom: 28px;
      animation: fadeUp 0.6s ease both;
    }
    .hero-badge i { font-size: 0.85rem; }
    .hero h1 {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 900; color: #fff; line-height: 1.08;
      margin-bottom: 22px;
      animation: fadeUp 0.7s 0.1s ease both;
    }
    .hero h1 span { color: var(--green-light); }
    .hero p {
      font-size: 1.12rem; color: #b8c8f0; line-height: 1.7;
      margin-bottom: 36px;
      animation: fadeUp 0.7s 0.2s ease both;
    }
    .hero-btns {
      display: flex; gap: 14px; flex-wrap: wrap;
      animation: fadeUp 0.7s 0.3s ease both;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 9px;
      padding: 14px 28px; border-radius: 50px;
      font-weight: 700; font-size: 1rem;
      text-decoration: none; transition: all 0.22s; cursor: pointer;
      border: none;
    }
    .btn-green { background: var(--green); color: #fff; box-shadow: 0 6px 24px rgba(58,173,58,0.35); }
    .btn-green:hover { background: var(--green-light); transform: translateY(-2px); box-shadow: 0 10px 32px rgba(58,173,58,0.45); }
    .btn-outline { background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.4); }
    .btn-outline:hover { background: rgba(255,255,255,0.1); border-color: #fff; }

    .hero-visual {
      position: absolute; right: 5vw; top: 50%; transform: translateY(-50%);
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      width: min(420px, 40vw);
      animation: fadeIn 1s 0.3s ease both;
    }
    .hero-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 16px; padding: 20px;
      backdrop-filter: blur(8px);
    }
    .hero-card i { font-size: 1.8rem; margin-bottom: 10px; display: block; }
    .hero-card h4 { color: #fff; font-size: 0.88rem; font-weight: 700; }
    .hero-card p { color: #a0b4e0; font-size: 0.78rem; margin-top: 4px; }
    .hero-card:nth-child(1) i { color: var(--green-light); }
    .hero-card:nth-child(2) i { color: var(--accent); }
    .hero-card:nth-child(3) i { color: #7eb8ff; }
    .hero-card:nth-child(4) i { color: #ff9a9a; }
    @media(max-width:900px){ .hero-visual { display: none; } }

    /* ===== STATS ===== */
    .stats-bar {
      background: var(--white);
      box-shadow: var(--shadow);
      padding: 28px 5vw;
      display: flex; justify-content: center; gap: 0; flex-wrap: wrap;
    }
    .stat-item {
      flex: 1; min-width: 140px; max-width: 220px;
      text-align: center; padding: 12px 24px;
      border-right: 1px solid var(--gray);
    }
    .stat-item:last-child { border-right: none; }
    .stat-num { font-family: 'Exo 2', sans-serif; font-size: 2.2rem; font-weight: 900; color: var(--blue); line-height: 1; }
    .stat-label { font-size: 0.82rem; color: var(--text-muted); font-weight: 600; margin-top: 4px; }

    /* ===== SECTIONS ===== */
    section { padding: 80px 5vw; }
    .section-tag {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(26,63,165,0.08); border-radius: 50px;
      padding: 6px 16px; color: var(--blue-light); font-size: 0.82rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 14px;
    }
    .section-title {
      font-family: 'Exo 2', sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 900; color: var(--text);
      line-height: 1.12; margin-bottom: 16px;
    }
    .section-title span { color: var(--blue); }
    .section-sub { color: var(--text-muted); font-size: 1.05rem; line-height: 1.7; max-width: 580px; }

    /* ===== SERVICES ===== */
    #services { background: var(--white); }
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px; margin-top: 48px;
    }
    .service-card {
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.25s, box-shadow 0.25s;
      cursor: pointer;
    }
    .service-card:hover { transform: translateY(-6px); box-shadow: 0 20px 60px rgba(26,63,165,0.18); }
    .service-card-head {
      padding: 28px 28px 22px;
      display: flex; align-items: center; gap: 16px;
    }
    .service-card-head i { font-size: 2rem; }
    .service-card-head h3 { font-family: 'Exo 2', sans-serif; font-size: 1.25rem; font-weight: 800; color: #fff; }
    .service-card-body { background: #fff; padding: 20px 28px 28px; }
    .service-list { list-style: none; }
    .service-list li {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 7px 0; border-bottom: 1px solid var(--gray);
      font-size: 0.95rem; color: var(--text);
    }
    .service-list li:last-child { border-bottom: none; }
    .service-list li i { color: var(--green); margin-top: 2px; font-size: 0.85rem; flex-shrink: 0; }

    .card-infographie .service-card-head { background: linear-gradient(135deg, var(--blue), var(--blue-light)); }
    .card-informatique .service-card-head { background: linear-gradient(135deg, #0e7a6a, #1fc5a8); }
    .card-abonnements .service-card-head { background: linear-gradient(135deg, #7c2d9e, #b05fd6); }
    .card-divers .service-card-head { background: linear-gradient(135deg, var(--green-dark), var(--green-light)); }

    /* ===== TARIFS ===== */
    #tarifs { background: var(--gray-light); }
    .tarifs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 24px; margin-top: 48px;
    }
    .tarif-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform 0.25s;
    }
    .tarif-card:hover { transform: translateY(-4px); }
    .tarif-head {
      padding: 20px 24px;
      color: #fff;
      font-family: 'Exo 2', sans-serif;
      font-weight: 800; font-size: 1.15rem;
      display: flex; align-items: center; gap: 12px;
    }
    .tarif-head i { font-size: 1.4rem; }
    .tarif-body { padding: 16px 24px 24px; }
    .tarif-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--gray);
      font-size: 0.95rem;
    }
    .tarif-row:last-child { border-bottom: none; }
    .tarif-row .name { font-weight: 600; color: var(--text); }
    .tarif-row .price {
      font-family: 'Exo 2', sans-serif; font-weight: 800;
      color: var(--blue); font-size: 1.05rem;
      white-space: nowrap;
    }
    .tarif-note {
      margin-top: 32px;
      background: linear-gradient(135deg, rgba(26,63,165,0.07), rgba(58,173,58,0.07));
      border: 1px solid var(--gray);
      border-radius: 14px; padding: 20px 24px;
      font-size: 0.93rem; color: var(--text-muted); line-height: 1.7;
    }
    .tarif-note strong { color: var(--blue); }
    .tarif-note .warning { color: #e05a00; }

    .tarif-head-blue { background: linear-gradient(135deg, var(--blue), var(--blue-light)); }
    .tarif-head-green { background: linear-gradient(135deg, var(--green-dark), var(--green)); }

    /* ===== CALCULATEUR DE DEVIS ===== */
    .quote-box {
      margin-top: 32px; background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 32px;
    }
    .quote-head { display: flex; gap: 16px; align-items: flex-start; margin-bottom: 24px; }
    .quote-head i { font-size: 1.8rem; color: var(--blue); margin-top: 4px; }
    .quote-head h3 { font-family: 'Exo 2', sans-serif; font-weight: 800; font-size: 1.2rem; margin-bottom: 4px; }
    .quote-head p { color: var(--text-muted); font-size: 0.9rem; }
    .quote-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .quote-item {
      display: flex; align-items: center; gap: 10px;
      border: 2px solid var(--gray); border-radius: 10px; padding: 10px 14px;
      cursor: pointer; transition: border-color 0.18s, background 0.18s; font-size: 0.88rem;
    }
    .quote-item:has(input:checked) { border-color: var(--green); background: rgba(58,173,58,0.07); }
    .quote-item input { width: 16px; height: 16px; accent-color: var(--green); flex-shrink: 0; }
    .quote-item span { flex: 1; font-weight: 600; color: var(--text); }
    .quote-item b { color: var(--blue); white-space: nowrap; font-family: 'Exo 2', sans-serif; }
    .quote-total-row {
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;
      margin-top: 24px; padding-top: 20px; border-top: 2px dashed var(--gray);
    }
    .quote-total { display: flex; flex-direction: column; }
    .quote-total span { font-size: 0.85rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
    .quote-total strong { font-family: 'Exo 2', sans-serif; font-size: 1.8rem; color: var(--blue); }

    /* ===== PORTFOLIO ===== */
    #portfolio { background: var(--white); }
    .portfolio-header { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 16px; margin-bottom: 40px; }
    .portfolio-filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn {
      padding: 8px 18px; border-radius: 50px;
      border: 2px solid var(--gray); background: none; cursor: pointer;
      font-weight: 700; font-size: 0.85rem; color: var(--text-muted);
      transition: all 0.18s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--blue); color: #fff; border-color: var(--blue);
    }
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }
    .portfolio-item {
      border-radius: 14px; overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      background: var(--gray-light);
      aspect-ratio: 1;
      position: relative; cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s;
    }
    .portfolio-item:hover { transform:
